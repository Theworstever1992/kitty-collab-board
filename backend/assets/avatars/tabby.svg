<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tabby Cat Avatar -->
  <circle cx="50" cy="50" r="45" fill="#FFA500"/>
  <!-- Ears -->
  <polygon points="25,30 15,5 40,20" fill="#FFA500"/>
  <polygon points="75,30 85,5 60,20" fill="#FFA500"/>
  <!-- Face -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FFD700"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="50" rx="6" ry="8" fill="#2C1810"/>
  <ellipse cx="62" cy="50" rx="6" ry="8" fill="#2C1810"/>
  <circle cx="40" cy="48" r="2" fill="#FFFFFF"/>
  <circle cx="64" cy="48" r="2" fill="#FFFFFF"/>
  <!-- Nose -->
  <polygon points="50,58 45,63 55,63" fill="#FF6B6B"/>
  <!-- Mouth -->
  <path d="M 50,63 Q 40,70 35,68" stroke="#2C1810" stroke-width="2" fill="none"/>
  <path d="M 50,63 Q 60,70 65,68" stroke="#2C1810" stroke-width="2" fill="none"/>
  <!-- Whiskers -->
  <line x1="30" y1="60" x2="10" y2="55" stroke="#2C1810" stroke-width="2"/>
  <line x1="30" y1="63" x2="10" y2="63" stroke="#2C1810" stroke-width="2"/>
  <line x1="30" y1="66" x2="10" y2="71" stroke="#2C1810" stroke-width="2"/>
  <line x1="70" y1="60" x2="90" y2="55" stroke="#2C1810" stroke-width="2"/>
  <line x1="70" y1="63" x2="90" y2="63" stroke="#2C1810" stroke-width="2"/>
  <line x1="70" y1="66" x2="90" y2="71" stroke="#2C1810" stroke-width="2"/>
  <!-- Stripes -->
  <path d="M 50,25 L 50,35" stroke="#CC8400" stroke-width="3"/>
  <path d="M 40,30 L 45,38" stroke="#CC8400" stroke-width="3"/>
  <path d="M 60,30 L 55,38" stroke="#CC8400" stroke-width="3"/>
</svg>
