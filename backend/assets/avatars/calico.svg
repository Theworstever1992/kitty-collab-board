<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calico Cat Avatar -->
  <circle cx="50" cy="50" r="45" fill="#FFFFFF"/>
  <!-- Ears -->
  <polygon points="25,30 15,5 40,20" fill="#E94560"/>
  <polygon points="75,30 85,5 60,20" fill="#FFFFFF"/>
  <!-- Face with patches -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FFFFFF"/>
  <ellipse cx="35" cy="45" rx="15" ry="12" fill="#E94560"/>
  <ellipse cx="65" cy="60" rx="12" ry="10" fill="#0f3460"/>
  <ellipse cx="55" cy="35" rx="10" ry="8" fill="#E94560"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="50" rx="6" ry="8" fill="#fbbf24"/>
  <ellipse cx="62" cy="50" rx="6" ry="8" fill="#fbbf24"/>
  <circle cx="40" cy="48" r="2" fill="#1a1a2e"/>
  <circle cx="64" cy="48" r="2" fill="#1a1a2e"/>
  <!-- Nose -->
  <polygon points="50,58 45,63 55,63" fill="#FF6B6B"/>
  <!-- Mouth -->
  <path d="M 50,63 Q 40,70 35,68" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <path d="M 50,63 Q 60,70 65,68" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <!-- Whiskers -->
  <line x1="30" y1="60" x2="10" y2="55" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="30" y1="63" x2="10" y2="63" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="30" y1="66" x2="10" y2="71" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="70" y1="60" x2="90" y2="55" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="70" y1="63" x2="90" y2="63" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="70" y1="66" x2="90" y2="71" stroke="#1a1a2e" stroke-width="2"/>
</svg>
