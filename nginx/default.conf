server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content Security Policy — tighten connect-src to your actual API host in production
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: image/svg+xml; connect-src 'self' ws:; font-src 'self';" always;

    # Serve Vue SPA — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to FastAPI v2 backend
    location /api/ {
        proxy_pass         http://backend:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket
    location /ws {
        proxy_pass         http://backend:9000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        # 300s (5 min) is sufficient; 86400s (24h) is excessive and wastes resources
        proxy_read_timeout 300s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
