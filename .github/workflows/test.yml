name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize board directory
        run: python wake_up.py
        env:
          # Provide a dummy key so wake_up doesn't fail validation
          ANTHROPIC_API_KEY: dummy-for-tests

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: dummy-for-tests
          DASHSCOPE_API_KEY: dummy-for-tests
          CLOWDER_BOARD_DIR: /tmp/clowder-test-board
          CLOWDER_LOG_DIR: /tmp/clowder-test-logs
